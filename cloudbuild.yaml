steps:
  - name: "gcr.io/cloud-builders/docker"
    entrypoint: "bash"
    args:
      - "-c"
      - "echo '$_DOCKERHUB_TOKEN' | docker login -u 'noxzz' --password-stdin && docker build -t docker.io/noxzz/hd-repo:$SHORT_SHA . && docker push docker.io/noxzz/hd-repo:$SHORT_SHA"

  - name: "gcr.io/cloud-builders/kubectl"
    args:
      - "set"
      - "image"
      - "deployment/hd-repo"
      - "hd-repo=docker.io/noxzz/hd-repo:$SHORT_SHA"
    env:
      - "CLOUDSDK_COMPUTE_ZONE=$_CLUSTER_ZONE"
      - "CLOUDSDK_CONTAINER_CLUSTER=$_CLUSTER_NAME"
      - "CLOUDSDK_CORE_PROJECT=$PROJECT_ID"

images:
  - "docker.io/noxzz/hd-repo:$SHORT_SHA"

substitutions:
  _CLUSTER_NAME: "hd-gke-cluster"
  _CLUSTER_ZONE: "australia-southeast1-a"
  _DOCKERHUB_TOKEN: ""

options:
  logging: CLOUD_LOGGING_ONLY
